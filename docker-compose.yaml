version: "3.9"

services:
  oracle-cloud-free-arm-instance:
    image: ghcr.io/icyice777/oracle-cloud-free-arm-instance:latest
    container_name: oracle-cloud-free-arm-instance
    volumes:
      - ~/.oci:/oracle/.oci
      - ./.env:/app/.env
      - ./oracle-arm-ssh.key.pub:/app/oracle-arm-ssh.key.pub
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
